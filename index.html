<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shutto Trans Tag Check</title>
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.6;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      color: #222;
      background: #fafafa;
    }
    h1, h2 {
      line-height: 1.3;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    button {
      padding: 8px 14px;
      border: 1px solid #999;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <script data-stt-id="1" src="https://d.shutto-translation.com/trans.js"></script>
  <h1>導入タグ 動作確認ページ</h1>
  <p class="muted">このページは mysite.test で翻訳タグの挙動を確認するためのサンプルです。</p>

  <section class="card">
    <h2>1. 基本文言</h2>
    <p>これは翻訳対象になる通常テキストです。東京の今日の天気は晴れです。</p>
    <p>料金プラン、お知らせ、お問い合わせ、よくある質問などを想定しています。</p>
  </section>

  <section class="card">
    <h2>2. ボタン・フォーム</h2>
    <button id="actionBtn">無料トライアルを開始する</button>
    <label for="nameInput">お名前</label>
    <input id="nameInput" type="text" placeholder="山田 太郎" />
    <label for="msgInput">お問い合わせ内容</label>
    <textarea id="msgInput" rows="3" placeholder="お問い合わせ内容を入力してください"></textarea>
  </section>

  <section class="card">
    <h2>3. 後から追加される文言</h2>
    <p id="dynamicText">3秒後にテキストを追加します。</p>
  </section>

  <section class="card">
    <h2>4. 英数字混在</h2>
    <p>注文番号: ORD-2026-0001 / 配送予定日: 2026-04-10</p>
    <p>APIキーは表示しないでください。</p>
  </section>

  <script>
    setTimeout(function () {
      var el = document.getElementById("dynamicText");
      el.textContent = "動的に追加された文言です。翻訳されるか確認してください。";
    }, 3000);

    document.getElementById("actionBtn").addEventListener("click", function () {
      alert("ボタンがクリックされました。");
    });
  </script>
</body>
</html>
